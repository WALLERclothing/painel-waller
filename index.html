<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waller Clothing | Painel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,500;0,700;0,800;1,900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1>WALLER CLOTHING</h1>
        <button class="btn-pdf" id="btnGerarPDF" onclick="gerarPDF()">Gerar PDF</button>
    </nav>

    <div class="tab-menu">
        <button id="tabCadastroBtn" class="tab-btn tab-active" onclick="mudarAba('cadastro')">📦 Lançar Drops</button>
        <button id="tabProducaoBtn" class="tab-btn" onclick="mudarAba('producao')">⚙️ Fila de Produção</button>
        <button id="tabEstampasBtn" class="tab-btn" onclick="mudarAba('estampas')">💀 Catálogo</button>
    </div>

    <div id="aba-cadastro" class="container">
        <div class="card">
            <h2 class="card-title">Lançar Drop / Pedido</h2>
            <div class="form-section">
                <div class="form-section-title">1. Dados do Cliente e Financeiro</div>
                <div class="form-grid">
                    <input type="text" id="nome" placeholder="NOME DO CLIENTE">
                    <input type="text" id="whatsapp" placeholder="WHATSAPP" maxlength="15">
                </div>
                <div class="form-grid">
                    <input type="text" id="valorTotal" class="moeda" placeholder="VALOR TOTAL" readonly style="background-color: #fee2e2; color: #d90429;">
                    <select id="metodoPagamento">
                        <option value="PIX">PIX</option>
                        <option value="CARTÃO">CARTÃO</option>
                    </select>
                    <select id="statusPagamento">
                        <option value="PAGO">💰 PAGO</option>
                        <option value="PENDENTE">⏳ PENDENTE</option>
                    </select>
                </div>
            </div>
            <div class="form-section" style="border-bottom: none;">
                <div class="form-section-title">2. Adicionar Peças ao Pedido</div>
                <div class="form-grid">
                    <input type="text" id="codigoEstampa" placeholder="CÓDIGO" style="flex: 0.5;">
                    <input type="text" id="nomeEstampa" placeholder="NOME DA ESTAMPA" style="flex: 1.5;">
                </div>
                <button type="button" class="btn-add" onclick="adicionarAoCarrinho()">+ ADICIONAR PEÇA NESTE PEDIDO</button>
            </div>
            <div id="carrinho-container">
                <div id="listaCarrinho"></div>
            </div>
            <button type="button" class="btn-primary" onclick="salvarPedidoCompleto()">GERAR ORDEM DE SERVIÇO</button>
        </div>
    </div>

    <div id="aba-producao" class="container" style="display: none;">
        <div class="dashboard-grid" id="dashContainer"></div>
        <div class="grid-pedidos" id="gridPedidosContainer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
