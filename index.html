<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waller Clothing | Mega Painel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,500;0,700;0,800;1,900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* === ESTILO BRUTALISTA DEEP DARK === */
        :root {
            color-scheme: light;
            --black: #000000;
            --white: #ffffff;
            --gray: #f4f4f4;
            --border-color: #000000;
            --border-thick: 3px solid var(--border-color);
            --red: #d90429;
            --green: #06d6a0;
            --text-main: #000000;
            --bg-body: #ffffff;
            --bg-card: #ffffff;
        }

        [data-theme="dark"] {
            color-scheme: dark;
            --black: #ffffff;        
            --white: #0d0d0d;        /* Preto Profundo */
            --gray: #151515;         /* Chumbo Escuro */
            --border-color: #252525; /* Bordas foscas */
            --red: #ff002b;          
            --green: #00f5a0;
            --text-main: #e0e0e0;    /* Texto claro mas não ofuscante */
            --bg-body: #080808;      /* Fundo total */
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 0; transition: 0.2s; }
        
        .navbar { background-color: #000; color: #fff; padding: 1.5rem 2rem; display: flex; justify-content: center; align-items: center; position: relative; border-bottom: 5px solid var(--red); }
        .navbar h1 { margin: 0; font-size: 2.2rem; font-weight: 900; font-style: italic; letter-spacing: -1px; text-transform: uppercase; }
        .nav-actions { position: absolute; right: 2rem; display: flex; gap: 10px; }
        .btn-nav { background-color: transparent; color: #fff; padding: 0.6rem 1.2rem; font-size: 0.85rem; font-weight: 800; border: 2px solid #fff; text-transform: uppercase; cursor: pointer; transition: 0.1s; }
        .btn-nav:hover { background-color: #fff; color: #000; }

        .tab-menu { display: flex; gap: 1rem; max-width: 1400px; margin: 2rem auto -1rem auto; padding: 0 1rem; flex-wrap: wrap; }
        .tab-btn { flex: 1; text-align: center; background-color: var(--white); color: var(--black); border: var(--border-thick); padding: 0.8rem 1rem; font-weight: 900; font-size: 0.95rem; cursor: pointer; box-shadow: 4px 4px 0px var(--border-color); transition: all 0.1s; text-transform: uppercase; }
        .tab-btn:hover { background-color: var(--gray); color: var(--black); }
        .tab-active { background-color: var(--black); color: var(--bg-body); box-shadow: 4px 4px 0px var(--red); pointer-events: none; }

        .container { max-width: 1400px; margin: 3rem auto; padding: 0 1rem; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .dash-card { background: var(--gray); border: var(--border-thick); padding: 1.5rem; box-shadow: 6px 6px 0px var(--border-color); display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
        .dash-card h3 { margin: 0 0 0.5rem 0; font-size: 0.8rem; text-transform: uppercase; font-weight: 900; opacity: 0.7; }
        .dash-card span { font-size: 2rem; font-weight: 900; font-style: italic; color: var(--red); }

        .card { background: var(--white); border: var(--border-thick); padding: 2rem; box-shadow: 8px 8px 0px var(--border-color); margin-bottom: 3rem; overflow-x: auto; }
        .card-title { font-size: 1.5rem; font-weight: 900; font-style: italic; text-transform: uppercase; margin-top: 0; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
        
        .form-section { border-bottom: 2px dashed var(--border-color); padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
        .form-section-title { font-size: 1rem; font-weight: 800; text-transform: uppercase; margin-bottom: 1rem; color: var(--red); }
        .form-grid { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
        
        input, select, textarea { width: 100%; padding: 0.8rem 1rem; font-size: 0.95rem; font-family: 'Montserrat', sans-serif; font-weight: 700; border: var(--border-thick); border-radius: 0; outline: none; box-sizing: border-box; background-color: var(--gray); color: var(--black); text-transform: uppercase; }
        input:focus, select:focus, textarea:focus { border-color: var(--red); }
        ::placeholder { color: #555; }

        button { font-family: 'Montserrat', sans-serif; font-weight: 800; cursor: pointer; border-radius: 0; transition: 0.1s; text-transform: uppercase; }
        .btn-primary { background-color: var(--black); color: var(--bg-body); border: var(--border-thick); padding: 1.2rem; font-size: 1.1rem; width: 100%; margin-top: 1rem; box-shadow: 5px 5px 0px var(--red); }
        .btn-primary:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--red); }
        
        /* KANBAN (GRID ESTÁTICO) */
        .kanban-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; align-items: flex-start; }
        .kanban-col { background: var(--white); border: var(--border-thick); padding: 1rem; display: flex; flex-direction: column; gap: 1rem; box-shadow: 5px 5px 0px var(--border-color); }
        .kanban-header { font-size: 1rem; font-weight: 900; text-align: center; border-bottom: 3px solid var(--red); padding-bottom: 0.5rem; margin-bottom: 0.5rem; }
        
        .pedido-card { background: var(--gray); border: var(--border-thick); position: relative; cursor: grab; }
        .pedido-header { padding: 10px; border-bottom: 2px solid var(--border-color); display: flex; flex-direction: column; gap: 5px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .checkbox-container { display: flex; align-items: center; gap: 5px; }
        .checkbox-bulk { width: 18px; height: 18px; cursor: pointer; accent-color: var(--red); }
        .pedido-id { font-weight: 900; font-size: 1.1rem; font-style: italic; }
        .pedido-data { font-size: 0.65rem; border: 1px solid var(--red); color: var(--red); padding: 1px 4px; font-weight: 800; }

        .pedido-body { padding: 10px; font-size: 0.85rem; }
        .cliente-info { font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .pedido-valor { color: var(--green); font-weight: 900; font-size: 0.9rem; }

        .toggle-itens-btn { background: var(--white); border: 2px dashed var(--border-color); padding: 5px; font-size: 0.7rem; font-weight: 900; text-align: center; cursor: pointer; margin-top: 10px; }
        .pedido-itens-lista { display: none; padding: 5px 0; flex-direction: column; gap: 4px; }
        .item-tag { background: var(--white); border-left: 4px solid var(--red); padding: 5px; font-size: 0.7rem; font-weight: 700; border-top: 1px solid var(--border-color); border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }

        .pedido-footer { display: flex; border-top: var(--border-thick); }
        .pedido-footer button { flex: 1; padding: 8px; font-size: 0.9rem; background: var(--gray); color: var(--black); border: none; border-right: 1px solid var(--border-color); }
        .pedido-footer button:last-child { border-right: none; }
        .pedido-footer button:hover { background: var(--black); color: var(--white); }

        .btn-pgto { font-size: 0.7rem; font-weight: 900; border: 2px solid var(--border-color); cursor: pointer; padding: 4px; width: 100%; margin-top: 5px; }
        .pgto-pago { background: var(--black); color: var(--green); }
        .pgto-pend { background: var(--white); color: var(--red); }

        /* CRM & CATALOGO */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { text-transform: uppercase; font-weight: 900; border-bottom: var(--border-thick); }
        .btn-icone { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; background: var(--gray); border: 2px solid var(--border-color); color: var(--black); cursor: pointer; text-decoration: none; font-weight: 900; }
        
        .badge-soldout { background: var(--red); color: #fff; padding: 2px 6px; font-size: 0.6rem; font-weight: 900; margin-left: 5px; border: 1px solid #000; }

        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .brutal-toast { background: var(--black); color: var(--white); border: 3px solid var(--red); padding: 1rem; font-weight: 900; text-transform: uppercase; margin-top: 10px; box-shadow: 5px 5px 0px var(--red); }

        #bulk-action-bar { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--white); border: var(--border-thick); padding: 1rem 2rem; display: flex; gap: 15px; align-items: center; z-index: 1000; transition: 0.3s; box-shadow: 10px 10px 0px #000; }
        #bulk-action-bar.show { bottom: 20px; }

        @media (max-width: 1000px) { .kanban-board { display: flex; overflow-x: auto; } .kanban-col { min-width: 300px; } }
    </style>
</head>
<body data-theme="dark">

<div class="toast-container" id="toastContainer"></div>

<nav class="navbar">
    <h1>WALLER CLOTHING</h1>
    <div class="nav-actions">
        <button class="btn-nav" onclick="toggleTheme()">🌓 ALTERAR TEMA</button>
        <button class="btn-nav" onclick="abrirModalPDF()">📄 RELATÓRIOS</button>
    </div>
</nav>

<div class="tab-menu">
    <button id="tabCadastroBtn" class="tab-btn tab-active" onclick="mudarAba('cadastro')">📦 LANÇAR</button>
    <button id="tabProducaoBtn" class="tab-btn" onclick="mudarAba('producao')">⚙️ KANBAN</button>
    <button id="tabEstampasBtn" class="tab-btn" onclick="mudarAba('estampas')">💀 CATÁLOGO</button>
    <button id="tabClientesBtn" class="tab-btn" onclick="mudarAba('clientes')">🤝 CRM</button>
</div>

<div id="aba-cadastro" class="container">
    <div class="card">
        <h2 class="card-title">Novo Pedido</h2>
        <div class="form-section">
            <div class="form-grid">
                <input type="text" id="whatsapp" placeholder="WHATSAPP" onblur="verificarClienteFiel()">
                <input type="text" id="nome" placeholder="NOME DO CLIENTE">
            </div>
            <div class="form-grid">
                <input type="text" id="cep" placeholder="CEP" onblur="buscarCEP(this.value)">
                <input type="text" id="endereco" placeholder="ENDEREÇO" style="flex: 2;">
                <input type="text" id="valorFrete" class="moeda" placeholder="FRETE" oninput="atualizarTelaCarrinho()">
            </div>
            <div class="form-grid">
                <select id="metodoPagamento"><option value="PIX">PIX</option><option value="CARTÃO">CARTÃO</option></select>
                <select id="statusPagamento"><option value="PENDENTE">⏳ PENDENTE</option><option value="PAGO">💰 PAGO</option></select>
                <input type="text" id="valorTotal" class="moeda" placeholder="TOTAL" readonly style="color:var(--red);">
            </div>
        </div>
        <div class="form-section" style="border:none;">
            <div class="form-grid">
                <input type="text" id="codigoEstampa" list="estampas-list" placeholder="CÓDIGO ESTAMPA" oninput="autocompletarEstampa(this.value)">
                <datalist id="estampas-list"></datalist>
                <input type="text" id="nomeEstampa" placeholder="NOME DA PEÇA">
                <input type="number" id="quantidade" value="1" style="flex:0.3;">
            </div>
            <button class="btn-add" onclick="adicionarAoCarrinho()">+ ADICIONAR PEÇA</button>
        </div>
        <div id="carrinho-container">
            <div id="listaCarrinho"></div>
        </div>
        <button class="btn-primary" onclick="salvarPedidoCompleto()">GERAR ORDEM DE SERVIÇO</button>
    </div>
</div>

<div id="aba-producao" class="container" style="display: none;">
    <div class="dashboard-grid">
        <div class="dash-card"><h3>PEDIDOS (MÊS)</h3><span id="dashPedidosMes">0</span></div>
        <div class="dash-card"><h3>FATURAMENTO</h3>
            <select id="selectFaturamentoMes" onchange="calcularFaturamentoMensal()" style="padding:2px; font-size:0.7rem; margin-top:5px;"></select>
            <span id="dashFaturamento">R$ 0,00</span>
        </div>
    </div>
    <div class="kanban-board">
        <div class="kanban-col" ondragover="allowDrop(event)" ondrop="drop(event, 'PEDIDO FEITO')">
            <div class="kanban-header">📥 PEDIDO FEITO</div>
            <div id="col-PEDIDO-FEITO" style="min-height:200px;"></div>
        </div>
        <div class="kanban-col" ondragover="allowDrop(event)" ondrop="drop(event, 'AGUARDANDO ESTAMPA')">
            <div class="kanban-header">👕 FILA ESTAMPA</div>
            <div id="col-AGUARDANDO-ESTAMPA" style="min-height:200px;"></div>
        </div>
        <div class="kanban-col" ondragover="allowDrop(event)" ondrop="drop(event, 'ESTAMPA PRONTA')">
            <div class="kanban-header">📦 PRONTO / ENVIO</div>
            <div id="col-ESTAMPA-PRONTA" style="min-height:200px;"></div>
        </div>
        <div class="kanban-col" ondragover="allowDrop(event)" ondrop="drop(event, 'PEDIDO ENVIADO')">
            <div class="kanban-header">🚚 ENVIADO</div>
            <div id="col-PEDIDO-ENVIADO" style="min-height:200px;"></div>
        </div>
    </div>
</div>

<div id="aba-estampas" class="container" style="display: none;">
    <div class="card">
        <h2 class="card-title">Estoque Catálogo</h2>
        <form onsubmit="salvarNovaEstampa(event)" class="form-grid">
            <input type="text" id="cadCodigoEstampa" placeholder="CÓD" required>
            <input type="text" id="cadNomeEstampa" placeholder="NOME" required style="flex:2;">
            <input type="number" id="cadEstoque" placeholder="ESTOQUE" required>
            <button type="submit" class="btn-icone" style="width:100%; height:auto;">SALVAR</button>
        </form>
        <table style="margin-top:2rem;">
            <thead><tr><th>CÓD</th><th>ESTAMPA</th><th>ESTOQUE</th><th>AÇÕES</th></tr></thead>
            <tbody id="listaEstampas"></tbody>
        </table>
    </div>
</div>

<div id="aba-clientes" class="container" style="display: none;">
    <div class="card">
        <h2 class="card-title">Fichas CRM</h2>
        <table>
            <thead><tr><th>CLIENTE</th><th>PEDIDOS</th><th>TOTAL</th><th>AÇÕES</th></tr></thead>
            <tbody id="listaClientesCRM"></tbody>
        </table>
    </div>
</div>

<div id="modalPDF" class="modal-overlay">
    <div class="modal-box" style="max-width:500px;">
        <button class="btn-close-modal" onclick="fecharModalPDF()">X</button>
        <h2 class="card-title">RELATÓRIOS</h2>
        <div class="grid-pdf-opcoes">
            <button class="btn-pdf-opcao" onclick="gerarPDFProducao('TODOS')">ORDEM COMPLETA</button>
            <button class="btn-pdf-opcao" onclick="gerarEtiquetasEnvio()">ETIQUETAS ENVIO</button>
            <button class="btn-pdf-opcao" onclick="gerarPDFFaturamento()" style="grid-column: 1/-1;">PDF FINANCEIRO MÊS</button>
        </div>
    </div>
</div>

<div id="bulk-action-bar">
    <strong id="bulk-count">0</strong> SELECIONADOS 
    <select id="bulk-status-select" style="width:auto; margin:0 10px;">
        <option value="AGUARDANDO ESTAMPA">FILA ESTAMPA</option>
        <option value="ESTAMPA PRONTA">PRONTO ENVIO</option>
        <option value="PEDIDO ENVIADO">ENVIADO</option>
    </select>
    <button onclick="executarBulkUpdate()" style="background:var(--black); color:var(--bg-body); padding:5px 15px;">OK</button>
    <button onclick="limparBulk()" style="color:var(--red); padding:5px;">X</button>
</div>

<script>
    // FIREBASE
    const firebaseConfig = { apiKey: "AIzaSyDnch84Sl5VyIi0YmOAde4jTftsssLEsNA", authDomain: "banco-de-dados-waller.firebaseapp.com", projectId: "banco-de-dados-waller", storageBucket: "banco-de-dados-waller.firebasestorage.app", messagingSenderId: "595978694752", appId: "1:595978694752:web:69aa74348560268a5a1305" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // TEMA
    function toggleTheme() {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
    }

    function showToast(msg) {
        const t = document.createElement('div'); t.className='brutal-toast'; t.innerText=msg;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(()=>t.remove(), 3000);
    }

    // UTILITARIOS
    function formatCurrency(n) { return "R$ " + (parseFloat(n)||0).toFixed(2).replace(".",","); }
    function unmaskCurrency(v) { return parseFloat(v.toString().replace(/[^\d,]/g,'').replace(',','.')) || 0; }

    document.addEventListener('input', e => {
        if(e.target.classList.contains('moeda')) {
            let val = e.target.value.replace(/\D/g,"");
            e.target.value = formatCurrency(val/100);
        }
    });

    async function buscarCEP(cep) {
        const c = cep.replace(/\D/g,'');
        if(c.length===8) {
            const r = await fetch(`https://viacep.com.br/ws/${c}/json/`);
            const d = await r.json();
            if(!d.erro) {
                document.getElementById('endereco').value = `${d.logradouro}, ${d.bairro} - ${d.localidade}/${d.uf}`;
                const fretes = { 'SP': 15, 'RJ': 20, 'MG': 20, 'ES': 20, 'PR': 25, 'SC': 25, 'RS': 25 };
                document.getElementById('valorFrete').value = formatCurrency(fretes[d.uf] || 35);
                atualizarTelaCarrinho();
            }
        }
    }

    function mudarAba(a) {
        ['cadastro','producao','estampas','clientes'].forEach(i => document.getElementById('aba-'+i).style.display = i===a ? 'block':'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        document.getElementById('tab'+a.charAt(0).toUpperCase()+a.slice(1)+'Btn').classList.add('tab-active');
    }

    // CATALOGO
    let catalogo = {};
    db.collection("estampas").orderBy("codigo").onSnapshot(snap => {
        const list = document.getElementById('listaEstampas'); list.innerHTML = '';
        const dl = document.getElementById('estampas-list'); dl.innerHTML = '';
        snap.forEach(doc => {
            const e = doc.data(); catalogo[e.codigo] = e;
            dl.innerHTML += `<option value="${e.codigo}">${e.nome}</option>`;
            list.innerHTML += `<tr><td>${e.codigo}</td><td>${e.nome} ${e.estoque<=0?'<span class="badge-soldout">SOLD OUT</span>':''}</td>
                <td><button onclick="ajustarEstoque('${doc.id}',-1)">-</button> <strong>${e.estoque}</strong> <button onclick="ajustarEstoque('${doc.id}',1)">+</button></td>
                <td><button onclick="excluirEstampa('${doc.id}')">X</button></td></tr>`;
        });
    });

    function ajustarEstoque(id, v) { db.collection("estampas").doc(id).update({ estoque: firebase.firestore.FieldValue.increment(v)}); }
    function autocompletarEstampa(v) { if(catalogo[v]) document.getElementById('nomeEstampa').value = catalogo[v].nome; }
    function salvarNovaEstampa(e) {
        e.preventDefault();
        const c = document.getElementById('cadCodigoEstampa').value.toUpperCase();
        const n = document.getElementById('cadNomeEstampa').value.toUpperCase();
        const s = parseInt(document.getElementById('cadEstoque').value);
        db.collection("estampas").doc(c).set({ codigo:c, nome:n, estoque:s });
    }

    // PEDIDOS
    let carrinho = [];
    function adicionarAoCarrinho() {
        const c = document.getElementById('codigoEstampa').value;
        const n = document.getElementById('nomeEstampa').value;
        const q = parseInt(document.getElementById('quantidade').value);
        if(!c || !n) return;
        carrinho.push({ codigo:c, nome:n, qtd:q, valor: 75 }); // Valor base exemplo
        atualizarTelaCarrinho();
    }

    function atualizarTelaCarrinho() {
        const cont = document.getElementById('listaCarrinho'); cont.innerHTML = '';
        let total = unmaskCurrency(document.getElementById('valorFrete').value);
        carrinho.forEach((i, idx) => {
            total += (i.qtd * i.valor);
            cont.innerHTML += `<div class="carrinho-item">${i.qtd}x ${i.nome} - [${i.codigo}] <button onclick="carrinho.splice(${idx},1);atualizarTelaCarrinho()">X</button></div>`;
        });
        document.getElementById('valorTotal').value = formatCurrency(total);
        document.getElementById('carrinho-container').style.display = carrinho.length ? 'block':'none';
    }

    async function salvarPedidoCompleto() {
        const num = Math.floor(1000+Math.random()*9000);
        const p = {
            numeroPedido: num,
            nome: document.getElementById('nome').value.toUpperCase(),
            whatsapp: document.getElementById('whatsapp').value,
            valorTotal: unmaskCurrency(document.getElementById('valorTotal').value),
            status: 'PEDIDO FEITO',
            statusPagamento: document.getElementById('statusPagamento').value,
            itens: carrinho,
            dataCriacao: firebase.firestore.FieldValue.serverTimestamp()
        };
        await db.collection("pedidos").add(p);
        carrinho = []; atualizarTelaCarrinho();
        showToast("PEDIDO SALVO!");
    }

    // KANBAN
    let todosPedidos = [];
    db.collection("pedidos").orderBy("dataCriacao","desc").onSnapshot(snap => {
        todosPedidos = [];
        let cols = { 'PEDIDO FEITO':'', 'AGUARDANDO ESTAMPA':'', 'ESTAMPA PRONTA':'', 'PEDIDO ENVIADO':'' };
        let meses = new Set();
        
        snap.forEach(doc => {
            const p = doc.data(); p.id = doc.id;
            const status = (p.status || 'PEDIDO FEITO').toUpperCase().replace('PRONTA / ESTAMPADA','ESTAMPA PRONTA');
            const data = p.dataCriacao ? p.dataCriacao.toDate() : new Date();
            const mesAno = `${data.getMonth()+1}/${data.getFullYear()}`;
            meses.add(mesAno);
            
            let html = `
            <div class="pedido-card" id="${p.id}" draggable="true" ondragstart="ev => ev.dataTransfer.setData('text', '${p.id}')">
                <div class="pedido-header">
                    <div class="header-top">
                        <div class="checkbox-container"><input type="checkbox" class="checkbox-bulk" value="${p.id}" onchange="checkBulk()"> <span class="pedido-id">#${p.numeroPedido}</span></div>
                        <span class="pedido-data">${data.toLocaleDateString()}</span>
                    </div>
                    <button class="btn-pgto ${p.statusPagamento==='PAGO'?'pgto-pago':'pgto-pend'}" onclick="db.collection('pedidos').doc('${p.id}').update({statusPagamento:'${p.statusPagamento==='PAGO'?'PENDENTE':'PAGO'}'})">${p.statusPagamento}</button>
                </div>
                <div class="pedido-body">
                    <div class="cliente-info">${p.nome}</div>
                    <div class="pedido-valor">${formatCurrency(p.valorTotal)}</div>
                    <div class="toggle-itens-btn" onclick="toggleItens('${p.id}')">PEÇAS ▼</div>
                    <div class="pedido-itens-lista" id="itens-${p.id}">${p.itens.map(i=>`<div class="item-tag">${i.qtd}x ${i.nome}</div>`).join('')}</div>
                </div>
                <div class="pedido-footer">
                    <button onclick="excluirPedido('${p.id}')">❌</button>
                </div>
            </div>`;
            if(cols[status] !== undefined) cols[status] += html;
            todosPedidos.push({...p, statusAtualizado: status, dataMesAno: mesAno});
        });

        Object.keys(cols).forEach(k => document.getElementById('col-'+k.replace(/ /g,'-')).innerHTML = cols[k]);
        const sel = document.getElementById('selectFaturamentoMes'); sel.innerHTML = '';
        meses.forEach(m => sel.innerHTML += `<option value="${m}">${m}</option>`);
        calcularFaturamentoMensal();
    });

    function toggleItens(id) { 
        const el = document.getElementById('itens-'+id);
        el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
    }

    function allowDrop(e) { e.preventDefault(); }
    function drop(e, s) { 
        e.preventDefault(); 
        const id = e.dataTransfer.getData("text");
        db.collection("pedidos").doc(id).update({ status: s });
    }

    function calcularFaturamentoMensal() {
        const m = document.getElementById('selectFaturamentoMes').value;
        let total = 0;
        todosPedidos.forEach(p => { if(p.dataMesAno === m && p.statusPagamento === 'PAGO') total += p.valorTotal; });
        document.getElementById('dashFaturamento').innerText = formatCurrency(total);
    }

    // BULK
    function checkBulk() {
        const n = document.querySelectorAll('.checkbox-bulk:checked').length;
        document.getElementById('bulk-count').innerText = n;
        document.getElementById('bulk-action-bar').classList.toggle('show', n > 0);
    }
    function limparBulk() { document.querySelectorAll('.checkbox-bulk').forEach(c => c.checked=false); checkBulk(); }
    function executarBulkUpdate() {
        const s = document.getElementById('bulk-status-select').value;
        const batch = db.batch();
        document.querySelectorAll('.checkbox-bulk:checked').forEach(c => batch.update(db.collection("pedidos").doc(c.value), { status: s }));
        batch.commit().then(() => { showToast("LOTES ATUALIZADOS!"); limparBulk(); });
    }

    // MODAIS PDF
    function abrirModalPDF() { document.getElementById('modalPDF').style.display='flex'; }
    function fecharModalPDF() { document.getElementById('modalPDF').style.display='none'; }
    function excluirPedido(id) { if(confirm("Apagar?")) db.collection("pedidos").doc(id).delete(); }
</script>
</body>
</html>
